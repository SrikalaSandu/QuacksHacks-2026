<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Emotional Companion</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #C7EABB;
            --text-dark: #2d3748;
            --text-soft: #718096;
            --border: #e2e8f0;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --success: #68D391;
            --danger: #FC8181;
            --error: #f56565;
            --transition: 150ms ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signup-container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            padding: 2rem;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signup-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .signup-subtitle {
            color: var(--text-soft);
            font-size: 0.95rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 999px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .form-label .required {
            color: var(--error);
            margin-left: 0.25rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(199, 234, 187, 0.2);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .chip-input-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .chip-input {
            flex: 1;
        }

        .btn-add-chip {
            padding: 0.75rem 1rem;
            background: var(--primary);
            color: var(--text-dark);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add-chip:hover {
            opacity: 0.9;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-height: 2rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(199, 234, 187, 0.3);
            border: 1px solid var(--primary);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .chip-remove {
            background: none;
            border: none;
            color: var(--text-soft);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
            margin: 0;
            transition: var(--transition);
        }

        .chip-remove:hover {
            color: var(--error);
        }

        .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            background: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(199, 234, 187, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--text-dark);
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--text-soft);
            margin-top: 0.5rem;
        }

        @media (max-width: 640px) {
            .signup-container {
                padding: 1.5rem;
            }

            .signup-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Validation helper
        const validateE164 = (phone) => {
            const e164Regex = /^\+[1-9]\d{1,14}$/;
            return e164Regex.test(phone);
        };

        // TODO: Connect to Firestore users collection
        const saveUserProfile = async (profile) => {
            console.log('📝 TODO: Save to Firestore users collection:', profile);
            // Simulate API call
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log('✅ Profile would be saved:', profile);
                    resolve({ success: true, userId: 'mock-user-' + Date.now() });
                }, 1000);
            });
        };

        function Signup() {
            // Form state
            const [name, setName] = useState('');
            const [phoneNumber, setPhoneNumber] = useState('');
            const [phoneError, setPhoneError] = useState('');
            const [goals, setGoals] = useState([]);
            const [goalInput, setGoalInput] = useState('');
            const [habits, setHabits] = useState([]);
            const [habitInput, setHabitInput] = useState('');
            const [checkInTime, setCheckInTime] = useState('21:00');
            const [timezone, setTimezone] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Common timezones
            const timezones = [
                'America/New_York',
                'America/Chicago',
                'America/Denver',
                'America/Los_Angeles',
                'America/Toronto',
                'Europe/London',
                'Europe/Paris',
                'Europe/Berlin',
                'Asia/Tokyo',
                'Asia/Shanghai',
                'Asia/Dubai',
                'Australia/Sydney',
                'Pacific/Auckland'
            ];

            // Set default timezone from browser
            useEffect(() => {
                try {
                    const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    setTimezone(browserTimezone);
                } catch (e) {
                    setTimezone('America/New_York');
                }
            }, []);

            // Phone validation on change
            const handlePhoneChange = (e) => {
                const value = e.target.value;
                setPhoneNumber(value);
                
                if (value && !validateE164(value)) {
                    setPhoneError('Phone must be in E.164 format (e.g., +1234567890)');
                } else {
                    setPhoneError('');
                }
            };

            // Add goal
            const addGoal = () => {
                const trimmed = goalInput.trim();
                if (trimmed && !goals.includes(trimmed)) {
                    setGoals([...goals, trimmed]);
                    setGoalInput('');
                }
            };

            const removeGoal = (goal) => {
                setGoals(goals.filter(g => g !== goal));
            };

            // Add habit
            const addHabit = () => {
                const trimmed = habitInput.trim();
                if (trimmed && !habits.includes(trimmed)) {
                    setHabits([...habits, trimmed]);
                    setHabitInput('');
                }
            };

            const removeHabit = (habit) => {
                setHabits(habits.filter(h => h !== habit));
            };

            // Calculate progress (simple: how many required fields filled)
            const calculateProgress = () => {
                let filled = 0;
                let total = 4;
                
                if (name.trim()) filled++;
                if (phoneNumber && !phoneError) filled++;
                if (goals.length > 0) filled++;
                if (habits.length > 0) filled++;
                
                return (filled / total) * 100;
            };

            // Handle submit
            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // Validate required fields
                if (!name.trim()) {
                    alert('Please enter your name');
                    return;
                }
                
                if (!phoneNumber || phoneError) {
                    alert('Please enter a valid phone number in E.164 format');
                    return;
                }

                if (goals.length === 0) {
                    alert('Please add at least one goal');
                    return;
                }

                if (habits.length === 0) {
                    alert('Please add at least one habit');
                    return;
                }

                setIsSubmitting(true);

                // Build profile object matching Firestore schema
                const profile = {
                    userId: null, // Will be set by backend
                    name: name.trim(),
                    phoneNumber: phoneNumber.trim(),
                    goals: goals,
                    habits: habits,
                    checkInTime: checkInTime,
                    timezone: timezone,
                    createdAt: new Date().toISOString()
                };

                try {
                    // TODO: Connect to Firestore users collection
                    const result = await saveUserProfile(profile);
                    
                    // Navigate to dashboard (in real app, use react-router)
                    alert('✅ Signup successful! Redirecting to dashboard...');
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    console.error('Signup error:', error);
                    alert('Error during signup. Please try again.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="signup-container">
                    <div className="signup-header">
                        <h1 className="signup-title">Welcome! 👋</h1>
                        <p className="signup-subtitle">Let's set up your emotional companion</p>
                    </div>

                    <div className="progress-bar">
                        <div className="progress-fill" style={{ width: `${calculateProgress()}%` }}></div>
                    </div>

                    <form onSubmit={handleSubmit}>
                        {/* Name */}
                        <div className="form-group">
                            <label className="form-label">
                                Name <span className="required">*</span>
                            </label>
                            <input
                                type="text"
                                className="form-input"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="Enter your name"
                                required
                            />
                        </div>

                        {/* Phone Number */}
                        <div className="form-group">
                            <label className="form-label">
                                Phone Number <span className="required">*</span>
                            </label>
                            <input
                                type="tel"
                                className={`form-input ${phoneError ? 'error' : ''}`}
                                value={phoneNumber}
                                onChange={handlePhoneChange}
                                placeholder="+1234567890"
                                required
                            />
                            {phoneError && <div className="error-message">{phoneError}</div>}
                            <div className="helper-text">
                                Required for voice calls (E.164 format: +[country code][number])
                            </div>
                        </div>

                        {/* Goals */}
                        <div className="form-group">
                            <label className="form-label">
                                Goals <span className="required">*</span>
                            </label>
                            <div className="chip-input-container">
                                <input
                                    type="text"
                                    className="form-input chip-input"
                                    value={goalInput}
                                    onChange={(e) => setGoalInput(e.target.value)}
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            addGoal();
                                        }
                                    }}
                                    placeholder="Add a goal"
                                />
                                <button type="button" className="btn-add-chip" onClick={addGoal}>
                                    Add
                                </button>
                            </div>
                            <div className="chips-container">
                                {goals.map((goal, idx) => (
                                    <div key={idx} className="chip">
                                        <span>{goal}</span>
                                        <button
                                            type="button"
                                            className="chip-remove"
                                            onClick={() => removeGoal(goal)}
                                            aria-label="Remove"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Habits */}
                        <div className="form-group">
                            <label className="form-label">
                                Habits <span className="required">*</span>
                            </label>
                            <div className="chip-input-container">
                                <input
                                    type="text"
                                    className="form-input chip-input"
                                    value={habitInput}
                                    onChange={(e) => setHabitInput(e.target.value)}
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            addHabit();
                                        }
                                    }}
                                    placeholder="Add a habit"
                                />
                                <button type="button" className="btn-add-chip" onClick={addHabit}>
                                    Add
                                </button>
                            </div>
                            <div className="chips-container">
                                {habits.map((habit, idx) => (
                                    <div key={idx} className="chip">
                                        <span>{habit}</span>
                                        <button
                                            type="button"
                                            className="chip-remove"
                                            onClick={() => removeHabit(habit)}
                                            aria-label="Remove"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Check-in Time */}
                        <div className="form-group">
                            <label className="form-label">
                                Daily Check-in Time <span className="required">*</span>
                            </label>
                            <input
                                type="time"
                                className="form-input"
                                value={checkInTime}
                                onChange={(e) => setCheckInTime(e.target.value)}
                                required
                            />
                            <div className="helper-text">
                                When would you like your daily check-in call?
                            </div>
                        </div>

                        {/* Timezone */}
                        <div className="form-group">
                            <label className="form-label">
                                Timezone <span className="required">*</span>
                            </label>
                            <select
                                className="form-select"
                                value={timezone}
                                onChange={(e) => setTimezone(e.target.value)}
                                required
                            >
                                {timezones.map((tz) => (
                                    <option key={tz} value={tz}>
                                        {tz.replace(/_/g, ' ')}
                                    </option>
                                ))}
                            </select>
                        </div>

                        {/* Submit */}
                        <button
                            type="submit"
                            className="btn-submit"
                            disabled={isSubmitting}
                        >
                            {isSubmitting ? 'Creating Account...' : 'Create Account'}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Signup />);
    </script>
</body>
</html>
